<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Task Prioritizer</title>

<link rel="stylesheet" href="/static/style.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="app-container">

<header class="header">
<h1>AI Task Prioritizer</h1>
<p>Organize and prioritize your tasks intelligently</p>
</header>

<div class="card">

<label class="label">How many tasks?</label>

<div class="input-group">
<input type="number" id="taskCount" min="1" placeholder="Enter number of tasks">
<button onclick="generateTasks()" class="btn-primary">Generate Tasks</button>
</div>

<form method="POST">

<div id="tasks" class="task-grid"></div>

<div class="action">
<button type="submit" class="btn-gradient">Calculate Priority</button>
</div>

</form>

</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
