<!DOCTYPE html>
<html>
<head>
<title>Priority Results</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>AI Suggested Task Order</h1>

<table border="1" width="100%">
<tr>
<th>Rank</th>
<th>Task</th>
<th>Score</th>
<th>Reason</th>
</tr>

{% for task, score, reason in results %}

<tr>
<td>{{ loop.index }}</td>
<td>{{ task }}</td>
<td>{{ score }}</td>
<td>{{ reason }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/">Add More Tasks</a>

</div>

</body>
</html>
